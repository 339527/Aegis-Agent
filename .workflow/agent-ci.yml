version: '1.0'
name: agent-ci
displayName: agent-ci
triggers:
  trigger: auto
  push:
    branches:
      include:
        - master
stages:
  - name: run-agent-test
    displayName: AgentTest
    strategy: naturally
    trigger: auto
    executor: []
    steps:
      - step: build@python
        name: run-python
        displayName: RunPython
        pythonVersion: '3.10'
        env:
          ZHIPU_API_KEY: ${ZHIPU_API_KEY}
          RUN_ENV: ci
        commands:
          - echo "🚀 Booting Agent CI..."
          - python -m pip install --upgrade pip -i https://pypi.tuna.tsinghua.edu.cn/simple
          - python -m pip install --no-cache-dir -r requirements.txt -i https://pypi.tuna.tsinghua.edu.cn/simple
          # 🌟 核心点 2：删掉你原来的 export 语句，因为 env 区块会自动帮你 export
          - python run.py
